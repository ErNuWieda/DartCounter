# Dieser Workflow führt die Tests auf verschiedenen Betriebssystemen und Python-Versionen aus.
# Er nutzt den wiederverwendbaren Workflow, um Code-Duplizierung zu vermeiden.
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Erlaubt manuelles Starten über die GitHub UI


jobs:
  call-reusable-test-workflow:
    uses: ./.github/workflows/reusable-test-workflow.yml
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
        # Schließe inkompatible Kombinationen aus, falls nötig
        # exclude:
        #   - os: macos-latest
        #     python-version: '3.9'

    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      # container-image wird nicht übergeben, da wir auf dem Host-System testen

  test-alembic-migrations:
    name: Test Alembic Migrations on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    uses: ./.github/workflows/reusable-test-workflow.yml
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # Migrationen sind OS-agnostisch, ein OS ist ausreichend
        python-version: ['3.11'] # Eine spezifische Python-Version verwenden

    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      pytest-marker: "alembic_migrations" # Marker für diesen spezifischen Test, der @pytest.mark.db verwendet
      setup-postgres: true # Wichtig: PostgreSQL-Dienst einrichten
      # container-image wird nicht übergeben, da wir auf dem Host-System testen